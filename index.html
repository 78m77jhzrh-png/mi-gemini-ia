<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gemini Clon</title>
    <!-- Cargamos Tailwind para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Un pequeño ajuste para que el scroll sea suave */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background-color: #333537;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-[#131314] text-gray-200 font-sans h-screen flex">

    <!-- Barra Lateral -->
    <aside class="w-64 bg-[#1e1f20] p-4 hidden md:flex flex-col">
        <button class="bg-[#28292a] hover:bg-[#333537] p-3 rounded-full text-sm mb-8 transition">
            + Nuevo chat
        </button>
        <div class="flex-1 overflow-y-auto text-sm space-y-2">
            <p class="text-gray-500 px-2 text-xs uppercase font-bold">Recientes</p>
            <div class="hover:bg-[#28292a] p-2 rounded-lg cursor-pointer transition">¿Qué es la IA?</div>
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="flex-1 flex flex-col items-center relative">
        
        <!-- Header -->
        <header class="w-full p-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-400">Gemini Clon</h1>
            <div class="w-8 h-8 bg-gradient-to-tr from-blue-400 to-purple-500 rounded-full shadow-lg"></div>
        </header>

        <!-- Contenedor de Mensajes -->
        <div id="chat-container" class="flex-1 w-full max-w-3xl overflow-y-auto p-4 space-y-6">
            <div class="text-center mt-20">
                <span class="bg-gradient-to-r from-blue-400 via-red-400 to-yellow-400 bg-clip-text text-transparent text-5xl font-medium">
                    Hola, soy tu IA.
                </span>
                <p class="mt-4 text-2xl text-gray-500">¿En qué puedo ayudarte hoy?</p>
            </div>
        </div>

        <!-- Input de Texto -->
        <div class="w-full max-w-3xl p-4 pb-8">
            <div class="bg-[#1e1f20] rounded-full flex items-center px-6 py-3 shadow-2xl border border-transparent focus-within:border-gray-700 transition">
                <input id="user-input" type="text" placeholder="Introduce una pregunta aquí" 
                       class="flex-1 bg-transparent border-none focus:outline-none text-lg placeholder-gray-500">
                
                <button id="send-btn" class="ml-4 text-blue-400 hover:text-blue-300 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-gray-500 mt-3 px-4">
                Gemini puede mostrar información imprecisa, incluso sobre las personas, por lo que te recomendamos que verifiques sus respuestas.
            </p>
        </div>
    </main>

    <!-- Importante: El script siempre al final antes de cerrar el body -->
    <script src="app.js"></script>
</body>
</html>
